name: 混淆当前版本源码

on:
  push:
    branches:
      - main
    paths:
      - _worker.js
  workflow_dispatch:

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "16"

      - name: Install javascript-obfuscator globally
        run: npm install -g javascript-obfuscator

      - name: Remove old obfuscated file if exists
        run: |
          if [ -f _worker_obfuscated.js ]; then
            rm _worker_obfuscated.js
            echo "已删除旧的 _worker_obfuscated.js"
          fi

      - name: Obfuscate _worker.js
        run: |
          javascript-obfuscator _worker.js \
            --output _worker_obfuscated.js \
            --compact true \
            --control-flow-flattening true \
            --control-flow-flattening-threshold 1 \
            --dead-code-injection true \
            --dead-code-injection-threshold 1 \
            --identifier-names-generator hexadecimal \
            --rename-globals true \
            --string-array true \
            --string-array-encoding 'rc4' \
            --string-array-threshold 1 \
            --transform-object-keys true \
            --unicode-escape-sequence true

      - name: Commit changes if any
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add _worker_obfuscated.js
          if git diff --cached --quiet; then
            echo "没有文件更改，跳过提交"
          else
            git commit -m "生成新的 _worker_obfuscated.js 文件"
          fi

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
